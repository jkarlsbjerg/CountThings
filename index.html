<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thing Count</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel (Pinned to 7.23.6 to fix the 'wve' module error) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .select-none { -webkit-user-select: none; user-select: none; }
        .animate-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* History Animation Styles */
        @keyframes crossFadeOut {
            0% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-10px) scale(1.2); filter: blur(2px); }
        }
        @keyframes crossFadeIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.8); filter: blur(2px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0px); }
        }
        .animate-cross-out { animation: crossFadeOut 3s ease-out forwards; }
        .animate-cross-in { animation: crossFadeIn 3s ease-out forwards; }
        
        @keyframes flashHighlight {
            0% { box-shadow: 0 0 0 4px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.8); }
            100% { box-shadow: 0 0 0 0px rgba(255,255,255,0), 0 0 0px rgba(255,255,255,0); }
        }
        .flash-tile { animation: flashHighlight 3s ease-out; }

        @keyframes buttonFlash {
            0% { background-color: rgba(0, 0, 0, 0.5); color: #fff; transform: scale(1.25); box-shadow: 0 0 15px rgba(0,0,0,0.4); }
            15% { background-color: rgba(0, 0, 0, 0.5); color: #fff; transform: scale(1.25); box-shadow: 0 0 15px rgba(0,0,0,0.4); }
            100% { background-color: transparent; color: rgba(17, 24, 39, 0.6); transform: scale(1); box-shadow: 0 0 0 transparent; }
        }
        .flash-button { animation: buttonFlash 3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Inline Icons ---
        const Icon = ({ path, className, onClick }) => (
            <svg onClick={onClick} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Plus = ({className}) => <Icon className={className} path={<><path d="M5 12h14"/><path d="M12 5v14"/></>} />;
        const Minus = ({className}) => <Icon className={className} path={<path d="M5 12h14"/>} />;
        const RotateCcw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Download = ({className}) => <Icon className={className} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const FileText = ({className}) => <Icon className={className} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></>} />;
        const X = ({className, onClick}) => <Icon className={className} onClick={onClick} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const Copy = ({className}) => <Icon className={className} path={<><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>} />;
        const Check = ({className}) => <Icon className={className} path={<polyline points="20 6 9 17 4 12"/>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        
        const HistoryIcon = ({className, onClick}) => <Icon className={className} onClick={onClick} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>} />;
        const UndoIcon = ({className, onClick, disabled}) => <Icon className={`${className} ${disabled ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}`} onClick={disabled ? undefined : onClick} path={<><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></>} />;
        const RedoIcon = ({className, onClick, disabled}) => <Icon className={`${className} ${disabled ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}`} onClick={disabled ? undefined : onClick} path={<><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></>} />;

        const BASE_COLORS = [
            '#88b5dd', '#9ba7db', '#a7c27d', '#ef8c8a', 
            '#79b756', '#e4ed86', '#dc88ae', '#e2e8f0'
        ];

        const INITIAL_CATEGORIES = ['None', 'Stretch', 'Band', 'Massage', 'Mobility', 'Other'];

        const INITIAL_DATA = [
            { id: '1', name: '01 cat/cow', exportName: 'cat/cow', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '2', name: '02 chest hang', exportName: 'chest hang', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '3', name: '03 x5 trans ab', exportName: 'x5 trans ab', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '4', name: '04 bridge', exportName: 'bridge', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '5', name: '05 knee twist', exportName: 'knee twist', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '6', name: '06a flat-b twist', exportName: 'flat-back twist', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '7', name: '06b x5 open book', exportName: 'x5 open book', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '8', name: '06c hip int/ext', exportName: 'hip int/ext', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '9', name: '07 x20 crunch', exportName: 'x20 crunch', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '10', name: '08 x20 oblique', exportName: 'x20 oblique crunch', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '11', name: '09 x3 McGill curl up', exportName: 'x3 McGill curl up', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '12', name: '09a x30s side plank', exportName: '30s side plank', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '13', name: '09b x10 s plank march', exportName: 'x10 side plank march', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '14', name: '09c x5 push-ups', exportName: 'x5 push-ups', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '15', name: '09d x3 bird dog', exportName: 'x3 bird dog', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '16', name: '09e x5 DNS star', exportName: 'x5 DNS star', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '17', name: '10 hip flex', exportName: 'hip flexor', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '17a', name: '10 couch', exportName: 'couch', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '18', name: '10 quad', exportName: 'quad', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '19', name: '11 chest', exportName: 'chest', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '20', name: '12 lat', exportName: 'lat', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '21', name: '13 shoulder ROM', exportName: 'shoulder ROM', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '22', name: '14 ham', exportName: 'ham', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '23', name: '15 inner thigh', exportName: 'inner thigh', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '24', name: '16 hip rotator', exportName: 'hip rotator', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '25', name: '17 t-spine twist', exportName: 't-spine twist', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '26', name: '20 band FULL', exportName: 'full round', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '27', name: '21 W-hold', exportName: 'W-hold', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '28', name: '22 pull apart', exportName: 'pull apart', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '29', name: '23 alphabet', exportName: 'RC alphabet', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '30', name: '24 external', exportName: 'RC external', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '30a', name: '25 waiter\'s carry 12 lbs 45s', exportName: 'waiter\'s carry (12lbs, 45s)', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '31', name: '30 mas shin', exportName: 'shin', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '32', name: '31 mas gun', exportName: 'gun', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '33', name: '32 mas finger', exportName: 'finger', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '34', name: '33 mas ball', exportName: 'ball', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '35', name: '34 quad roll', exportName: 'quad roll', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '40', name: '35 Luis', exportName: 'Luis', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '36', name: '40 x20 air squat', exportName: 'x20 air squat', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '37', name: '41 squat stretch', exportName: 'deep squat stretch', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '38', name: '50 skater twist', exportName: 'skater twist', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '39', name: '51 x10 calf', exportName: 'x10 calf raise and stretch', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '60', name: '60: SMM (full)', exportName: 'SMM (full)', exportGroup: 'Mobility', color: BASE_COLORS[2], count: 0 },
            { id: '61', name: '61: SMM (partial)', exportName: 'SMM (partial)', exportGroup: 'Mobility', color: BASE_COLORS[2], count: 0 }
        ];

        function darkenColor(hex, percent) {
            if (!hex) return '#e2e8f0';
            let r = parseInt(hex.slice(1, 3), 16) || 0;
            let g = parseInt(hex.slice(3, 5), 16) || 0;
            let b = parseInt(hex.slice(5, 7), 16) || 0;
            r = Math.floor(r * (1 - percent / 100));
            g = Math.floor(g * (1 - percent / 100));
            b = Math.floor(b * (1 - percent / 100));
            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
        }

        function getSettingsDotColor(hex) {
            if (!hex) return 'rgba(0,0,0,0.5)';
            let r = parseInt(hex.slice(1, 3), 16) || 0;
            let g = parseInt(hex.slice(3, 5), 16) || 0;
            let b = parseInt(hex.slice(5, 7), 16) || 0;
            let lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return lum > 0.55 ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.85)';
        }

        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_data');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    const requiredIds = [
                        { id: '17a', name: '10 couch', exportName: 'couch', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
                        { id: '30a', name: '25 waiter\'s carry 12 lbs 45s', exportName: 'waiter\'s carry (12lbs, 45s)', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
                        { id: '40', name: '35 Luis', exportName: 'Luis', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
                        { id: '60', name: '60: SMM (full)', exportName: 'SMM (full)', exportGroup: 'Mobility', color: BASE_COLORS[2], count: 0 },
                        { id: '61', name: '61: SMM (partial)', exportName: 'SMM (partial)', exportGroup: 'Mobility', color: BASE_COLORS[2], count: 0 }
                    ];
                    requiredIds.forEach(req => {
                        if (!parsed.some(i => i.id === req.id)) {
                            parsed.push(req);
                        }
                    });
                    return parsed;
                }
                return INITIAL_DATA;
            });

            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_cats');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    if (!parsed.includes('Mobility')) parsed.push('Mobility');
                    return parsed;
                }
                return INITIAL_CATEGORIES;
            });
            
            const [history, setHistory] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_history');
                return saved ? JSON.parse(saved) : [];
            });
            const [historyIndex, setHistoryIndex] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_historyIndex');
                return saved ? JSON.parse(saved) : -1;
            });

            const [editingItem, setEditingItem] = useState(null);
            const [showExport, setShowExport] = useState(false);
            const [showHistoryModal, setShowHistoryModal] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [itemToDelete, setItemToDelete] = useState(null);
            const [exportText, setExportText] = useState("");
            const [copied, setCopied] = useState(false);
            const [newCatName, setNewCatName] = useState("");
            const [animatingTile, setAnimatingTile] = useState(null);

            useEffect(() => { localStorage.setItem('thingCountApp_v2_data', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('thingCountApp_v2_cats', JSON.stringify(categories)); }, [categories]);
            useEffect(() => { localStorage.setItem('thingCountApp_v2_history', JSON.stringify(history)); }, [history]);
            useEffect(() => { localStorage.setItem('thingCountApp_v2_historyIndex', JSON.stringify(historyIndex)); }, [historyIndex]);

            const itemsWithGradient = useMemo(() => {
                const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));
                const colorCounts = {};
                return sorted.map(item => {
                    const base = item.color || BASE_COLORS[7];
                    const count = colorCounts[base] || 0;
                    colorCounts[base] = count + 1;
                    const finalColor = darkenColor(base, count * 3);
                    return { ...item, displayColor: finalColor };
                });
            }, [items]);

            const recordHistory = (id, itemName, oldVal, newVal) => {
                const newRecord = {
                    id: Date.now().toString() + Math.random().toString(),
                    itemId: id,
                    itemName: itemName,
                    oldVal,
                    newVal,
                    timestamp: Date.now()
                };
                let newHistory = history.slice(0, historyIndex + 1);
                newHistory.push(newRecord);
                if (newHistory.length > 20) {
                    newHistory = newHistory.slice(newHistory.length - 20);
                }
                setHistory(newHistory);
                setHistoryIndex(newHistory.length - 1);
            };

            const updateCount = (id, delta) => {
                setItems(prevItems => {
                    let itemName = '';
                    let oldVal = 0;
                    let newVal = 0;
                    const nextItems = prevItems.map(item => {
                        if (item.id === id) {
                            itemName = item.name;
                            oldVal = item.count;
                            newVal = item.count + delta;
                            return { ...item, count: newVal };
                        }
                        return item;
                    });
                    if (itemName) {
                        recordHistory(id, itemName, oldVal, newVal);
                    }
                    return nextItems;
                });
            };

            const triggerAnimation = (itemId, fromVal, toVal) => {
                setTimeout(() => {
                    const el = document.getElementById(`tile-${itemId}`);
                    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
                }, 50);
                const direction = toVal > fromVal ? 'increase' : 'decrease';
                setAnimatingTile({ itemId, fromVal, toVal, direction, key: Date.now() });
                setTimeout(() => setAnimatingTile(null), 3000);
            };

            const handleUndo = () => {
                if (historyIndex < 0) return;
                const record = history[historyIndex];
                setHistoryIndex(historyIndex - 1);
                setItems(prev => prev.map(i => i.id === record.itemId ? { ...i, count: record.oldVal } : i));
                triggerAnimation(record.itemId, record.newVal, record.oldVal);
            };

            const handleRedo = () => {
                if (historyIndex >= history.length - 1) return;
                const record = history[historyIndex + 1];
                setHistoryIndex(historyIndex + 1);
                setItems(prev => prev.map(i => i.id === record.itemId ? { ...i, count: record.newVal } : i));
                triggerAnimation(record.itemId, record.oldVal, record.newVal);
            };

            const handleResetAll = () => {
                setItems(items.map(item => ({ ...item, count: 0 })));
                setShowResetConfirm(false);
            };

            const generateExportText = (includeAll = false) => {
                const activeItems = [...items]
                    .filter(item => includeAll || item.count > 0)
                    .sort((a, b) => a.name.localeCompare(b.name));

                let finalExport = "MM: ";
                let currentGroup = null;
                let groupBuffer = [];

                const flushBuffer = () => {
                    if (groupBuffer.length === 0) return "";
                    const innerText = groupBuffer.map(i => {
                        const displayCount = (includeAll && i.count === 0) ? 'qq' : i.count;
                        return `${displayCount} *${i.exportName}`;
                    }).join('; ');
                    const groupName = currentGroup === 'None' ? '' : currentGroup;
                    return groupName ? `${groupName} [${innerText}]; ` : `${innerText}; `;
                };

                activeItems.forEach(item => {
                    const g = item.exportGroup || 'None';
                    if (g !== currentGroup) {
                        finalExport += flushBuffer();
                        currentGroup = g;
                        groupBuffer = [];
                    }
                    groupBuffer.push(item);
                });

                finalExport += flushBuffer();
                setExportText(finalExport.trim());
                setShowExport(true);
                setCopied(false);
            };

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = exportText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const addCategory = () => {
                if (newCatName && !categories.includes(newCatName)) {
                    setCategories([...categories, newCatName]);
                    setNewCatName("");
                }
            };

            const deleteCategory = (cat) => {
                if (cat === 'None') return;
                setCategories(categories.filter(c => c !== cat));
                setItems(items.map(i => i.exportGroup === cat ? { ...i, exportGroup: 'None' } : i));
            };

            return (
                <div className="min-h-screen bg-[#f4ebf8] pb-24 select-none overflow-x-hidden">
                    <header className="bg-white px-3 py-3 shadow-sm sticky top-0 z-30 flex items-center justify-between text-[#2e1b6b]">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 shrink-0 rounded-lg bg-[#2e1b6b] flex items-center justify-center text-white font-black text-xs tracking-tighter">TC</div>
                            <h1 className="text-lg font-bold tracking-tight hidden sm:block">Thing Count</h1>
                        </div>
                        <div className="flex items-center gap-1 overflow-x-auto no-scrollbar">
                            <button disabled={historyIndex < 0} onClick={handleUndo} className="p-2 rounded-full hover:bg-gray-100 active:bg-purple-100 transition-colors shrink-0"><UndoIcon className="w-5 h-5" disabled={historyIndex < 0} /></button>
                            <button disabled={historyIndex >= history.length - 1} onClick={handleRedo} className="p-2 rounded-full hover:bg-gray-100 active:bg-purple-100 transition-colors shrink-0"><RedoIcon className="w-5 h-5" disabled={historyIndex >= history.length - 1} /></button>
                            
                            <div className="w-px h-6 bg-gray-200 mx-1 shrink-0"></div>
                            
                            <button onClick={() => setShowHistoryModal(true)} className="p-2 rounded-full hover:bg-gray-100 active:bg-purple-100 transition-colors shrink-0"><HistoryIcon className="w-5 h-5" /></button>
                            <button onClick={() => generateExportText(false)} className="p-2 rounded-full hover:bg-gray-100 active:bg-purple-100 transition-colors shrink-0"><Download className="w-5 h-5" /></button>
                            <button onClick={() => generateExportText(true)} className="p-2 rounded-full hover:bg-gray-100 active:bg-purple-100 transition-colors shrink-0"><FileText className="w-5 h-5" /></button>
                            <button onClick={() => setShowResetConfirm(true)} className="p-2 rounded-full hover:bg-red-50 text-red-600 active:bg-red-100 transition-colors shrink-0"><RotateCcw className="w-5 h-5" /></button>
                        </div>
                    </header>

                    <main className="p-3 max-w-2xl mx-auto grid grid-cols-2 gap-3">
                        {(() => {
                            let currentCategory = null;
                            const elements = [];
                            
                            itemsWithGradient.forEach(item => {
                                const itemCategory = item.exportGroup || 'None';
                                
                                if (itemCategory !== currentCategory) {
                                    elements.push(
                                        <div key={`header-${itemCategory}`} className="col-span-2 pt-5 pb-1 text-center font-bold text-gray-800 text-sm tracking-wide uppercase">
                                            {itemCategory === 'None' ? 'Uncategorized' : itemCategory}
                                        </div>
                                    );
                                    currentCategory = itemCategory;
                                }

                                const isAnimating = animatingTile?.itemId === item.id;
                                const flashMinus = isAnimating && animatingTile.direction === 'decrease';
                                const flashPlus = isAnimating && animatingTile.direction === 'increase';

                                elements.push(
                                    <div id={`tile-${item.id}`} key={item.id} className={`relative rounded-xl shadow-sm flex flex-col transition-transform active:scale-[0.97] ${isAnimating ? 'flash-tile' : ''}`} style={{ backgroundColor: item.displayColor }}>
                                        <button 
                                            onClick={() => setEditingItem({...item})} 
                                            className="absolute bottom-3 left-[60%] w-2 h-2 rounded-full transition-colors shadow-sm z-10 p-2 opacity-80 hover:opacity-100" 
                                            style={{ backgroundColor: getSettingsDotColor(item.displayColor) }}
                                        />
                                        <div className="pt-3 px-2 pb-1 text-center text-gray-800 text-sm font-semibold">{item.name}</div>
                                        <div className="flex items-center justify-between px-2 pb-3">
                                            <button onClick={() => updateCount(item.id, -1)} className={`w-12 h-12 flex items-center justify-center text-gray-900/60 hover:text-gray-900 active:bg-black/10 rounded-full ${flashMinus ? 'flash-button' : ''}`}>
                                                <Minus className="w-6 h-6" />
                                            </button>
                                            
                                            <div className="relative w-16 h-12 flex items-center justify-center">
                                                {isAnimating ? (
                                                    <React.Fragment>
                                                        <div key={`out-${animatingTile.key}`} className="absolute inset-0 flex items-center justify-center text-4xl font-bold text-gray-900 tabular-nums animate-cross-out">
                                                            {animatingTile.fromVal}
                                                        </div>
                                                        <div key={`in-${animatingTile.key}`} className="absolute inset-0 flex items-center justify-center text-4xl font-bold text-gray-900 tabular-nums animate-cross-in">
                                                            {animatingTile.toVal}
                                                        </div>
                                                    </React.Fragment>
                                                ) : (
                                                    <div className="text-4xl font-bold text-gray-900 tabular-nums text-center w-full">{item.count}</div>
                                                )}
                                            </div>

                                            <button onClick={() => updateCount(item.id, 1)} className={`w-12 h-12 flex items-center justify-center text-gray-900/60 hover:text-gray-900 active:bg-black/10 rounded-full ${flashPlus ? 'flash-button' : ''}`}>
                                                <Plus className="w-6 h-6" />
                                            </button>
                                        </div>
                                    </div>
                                );
                            });
                            return elements;
                        })()}
                    </main>

                    <button onClick={() => setEditingItem({ id: Date.now().toString(), name: '', exportName: '', exportGroup: 'None', color: BASE_COLORS[0], count: 0 })}
                        className="fixed bottom-6 right-6 w-16 h-16 bg-[#2e1b6b] text-white rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-all z-40">
                        <Plus className="w-9 h-9" />
                    </button>

                    {/* SETTINGS MODAL */}
                    {editingItem && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center animate-in">
                            <div className="bg-white rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                    <h2 className="text-sm font-black text-gray-500 uppercase tracking-widest">Settings</h2>
                                    <button onClick={() => setEditingItem(null)} className="p-2 text-gray-400"><X className="w-6 h-6" /></button>
                                </div>
                                <div className="p-5 space-y-5 overflow-y-auto">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block">Display Name</label>
                                            <input type="text" value={editingItem.name} onChange={e => setEditingItem({...editingItem, name: e.target.value})} className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-purple-500 font-medium"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block">Export Name</label>
                                            <input type="text" value={editingItem.exportName} onChange={e => setEditingItem({...editingItem, exportName: e.target.value})} className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-purple-500 font-medium"/>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block">Category</label>
                                            <select value={editingItem.exportGroup} onChange={e => setEditingItem({...editingItem, exportGroup: e.target.value})} className="w-full px-4 py-3 bg-gray-50 rounded-xl border-none focus:ring-2 focus:ring-purple-500 font-medium">
                                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1.5 block">Color</label>
                                            <div className="flex flex-wrap gap-2">
                                                {BASE_COLORS.map(color => (
                                                    <button key={color} onClick={() => setEditingItem({...editingItem, color})} className={`w-10 h-10 rounded-lg border-4 transition-all ${editingItem.color === color ? 'border-[#2e1b6b] scale-110' : 'border-transparent'}`} style={{ backgroundColor: color }} />
                                                ))}
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t">
                                            <div className="flex gap-2 mb-3">
                                                <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)} className="flex-1 px-3 py-2 bg-gray-50 rounded-lg text-sm" placeholder="New category..."/>
                                                <button onClick={addCategory} className="px-3 py-2 bg-purple-100 text-purple-700 rounded-lg text-sm font-bold">Add</button>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {categories.filter(c => c !== 'None').map(c => (
                                                    <span key={c} className="flex items-center gap-1 px-2 py-1 bg-gray-100 rounded-md text-[10px] font-bold uppercase tracking-wider text-gray-600">
                                                        {c} <X className="w-3 h-3 cursor-pointer text-red-400" onClick={() => deleteCategory(c)}/>
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 bg-gray-50 flex flex-wrap gap-2 justify-between">
                                    <div className="flex gap-2">
                                        {items.some(i => i.id === editingItem.id) && (
                                            <>
                                                <button onClick={() => setItemToDelete(editingItem)} className="px-4 py-3 text-red-500 font-bold active:bg-red-50 rounded-xl border border-transparent">Delete</button>
                                                <button onClick={() => { 
                                                    const newItem = { ...editingItem, id: Date.now().toString(), name: `${editingItem.name} (copy)`, count: -1 };
                                                    setItems([...items, newItem]);
                                                    setEditingItem(newItem);
                                                }} className="px-4 py-3 text-blue-600 font-bold active:bg-blue-50 bg-white rounded-xl shadow-sm border border-gray-100">Duplicate</button>
                                            </>
                                        )}
                                    </div>
                                    <div className="flex gap-2 flex-1 sm:flex-none justify-end mt-2 sm:mt-0 w-full sm:w-auto">
                                        <button onClick={() => setEditingItem(null)} className="px-4 py-3 text-gray-500 font-bold bg-white rounded-xl shadow-sm border border-gray-100">Cancel</button>
                                        <button onClick={() => { 
                                            if(!editingItem.name) return;
                                            const finalItem = {...editingItem, exportName: editingItem.exportName || editingItem.name.replace(/^\d+[a-z]?\s*/, '')};
                                            setItems(items.some(i => i.id === finalItem.id) ? items.map(i => i.id === finalItem.id ? finalItem : i) : [...items, finalItem]);
                                            setEditingItem(null);
                                        }} className="px-6 py-3 bg-[#2e1b6b] text-white font-bold rounded-xl shadow-lg active:bg-black">Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* HISTORY MODAL */}
                    {showHistoryModal && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[80vh] overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-[#2e1b6b] text-white">
                                    <h2 className="text-lg font-bold tracking-tight uppercase tracking-wider text-xs flex items-center gap-2"><HistoryIcon className="w-5 h-5"/> Action History</h2>
                                    <button onClick={() => setShowHistoryModal(false)} className="p-1"><X className="w-6 h-6" /></button>
                                </div>
                                <div className="p-4 overflow-y-auto flex-1 space-y-2">
                                    {history.length === 0 ? (
                                        <div className="text-center text-gray-500 py-8 text-sm">No changes recorded yet.</div>
                                    ) : (
                                        [...history].reverse().map((record, idx) => {
                                            const originalIdx = history.length - 1 - idx;
                                            const isCurrent = originalIdx === historyIndex;
                                            const isUndone = originalIdx > historyIndex;
                                            return (
                                                <div key={record.id} className={`flex justify-between items-center p-3 rounded-lg border ${isCurrent ? 'border-purple-500 bg-purple-50 shadow-sm' : 'border-gray-200'} ${isUndone ? 'opacity-40 grayscale' : ''}`}>
                                                    <div>
                                                        <div className="font-bold text-sm text-gray-800">{record.itemName}</div>
                                                        <div className="text-xs text-gray-500 font-mono mt-0.5">{new Date(record.timestamp).toLocaleTimeString()}</div>
                                                    </div>
                                                    <div className="flex items-center gap-3 font-mono font-bold text-lg">
                                                        <span className="text-gray-400">{record.oldVal}</span>
                                                        <span className="text-gray-300 text-sm">&rarr;</span>
                                                        <span className={record.newVal > record.oldVal ? "text-green-600" : "text-red-600"}>{record.newVal}</span>
                                                    </div>
                                                </div>
                                            );
                                        })
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* DELETE CONFIRM */}
                    {itemToDelete && (
                        <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-6 animate-in">
                            <div className="bg-white rounded-2xl w-full max-w-xs shadow-2xl p-6 text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><Trash2 className="w-8 h-8" /></div>
                                <h3 className="text-xl font-bold text-gray-900 mb-2">Delete?</h3>
                                <p className="text-gray-500 mb-6 text-sm">Remove "{itemToDelete.name}" forever?</p>
                                <div className="flex flex-col gap-2">
                                    <button onClick={() => { setItems(items.filter(i => i.id !== itemToDelete.id)); setItemToDelete(null); setEditingItem(null); }} className="w-full py-4 bg-red-600 text-white font-bold rounded-xl active:scale-95 transition-all">YES, DELETE</button>
                                    <button onClick={() => setItemToDelete(null)} className="w-full py-4 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95 transition-all">CANCEL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RESET CONFIRM */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-6 animate-in">
                            <div className="bg-white rounded-2xl w-full max-w-xs shadow-2xl p-6 text-center">
                                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><RotateCcw className="w-8 h-8" /></div>
                                <h3 className="text-xl font-bold text-gray-900 mb-2">Reset All?</h3>
                                <p className="text-gray-500 mb-6 text-sm">This will clear all counts back to zero.</p>
                                <div className="flex flex-col gap-2">
                                    <button onClick={handleResetAll} className="w-full py-4 bg-red-600 text-white font-bold rounded-xl active:scale-95 transition-all">YES, RESET</button>
                                    <button onClick={() => setShowResetConfirm(false)} className="w-full py-4 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95 transition-all">CANCEL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* EXPORT LOG */}
                    {showExport && (
                        <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[80vh]">
                                <div className="p-4 border-b flex justify-between items-center bg-[#2e1b6b] text-white">
                                    <h2 className="text-lg font-bold tracking-tight uppercase tracking-wider text-xs">Export Log</h2>
                                    <button onClick={() => setShowExport(false)} className="p-1"><X className="w-6 h-6" /></button>
                                </div>
                                <div className="p-6 overflow-y-auto">
                                    <div className="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300 text-gray-800 font-mono text-sm break-words whitespace-pre-wrap leading-relaxed select-text">
                                        {exportText || "No counters yet!"}
                                    </div>
                                </div>
                                <div className="p-4 bg-gray-50 border-t flex gap-3">
                                    <button onClick={handleCopy} disabled={!exportText}
                                        className={`flex-1 flex items-center justify-center gap-2 py-4 font-bold rounded-xl transition-all shadow-md active:scale-95 ${copied ? 'bg-green-600 text-white' : 'bg-[#2e1b6b] text-white'}`}>
                                        {copied ? <><Check className="w-6 h-6" /> Copied!</> : <><Copy className="w-6 h-6" /> Copy to Clipboard</>}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
