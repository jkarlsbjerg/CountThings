<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thing Count</title>
    <!-- We load React, Babel, and Tailwind directly via CDN so no build tools are needed -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f4ebf8]">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Inline Icons to remove dependencies ---
        const Icon = ({ path, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{path}</svg>
        );
        const Plus = ({className}) => <Icon className={className} path={<><path d="M5 12h14"/><path d="M12 5v14"/></>} />;
        const Minus = ({className}) => <Icon className={className} path={<path d="M5 12h14"/>} />;
        const RotateCcw = ({className}) => <Icon className={className} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Download = ({className}) => <Icon className={className} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const X = ({className}) => <Icon className={className} path={<><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>} />;
        const Copy = ({className}) => <Icon className={className} path={<><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></>} />;
        const Check = ({className}) => <Icon className={className} path={<polyline points="20 6 9 17 4 12"/>} />;
        const Trash2 = ({className}) => <Icon className={className} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;

        // --- App Logic ---
        const BASE_COLORS = ['#88b5dd','#9ba7db','#a7c27d','#ef8c8a','#79b756','#e4ed86','#dc88ae','#e2e8f0'];
        const INITIAL_CATEGORIES = ['None', 'Stretch', 'Band', 'Massage', 'Other'];
        
        const INITIAL_DATA = [
            { id: '1', name: '01 cat/cow', exportName: 'cat/cow', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '2', name: '02 chest hang', exportName: 'chest hang', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '3', name: '03 x5 trans ab', exportName: 'x5 trans ab', exportGroup: 'None', color: BASE_COLORS[0], count: 0 },
            { id: '4', name: '04 bridge', exportName: 'bridge', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '5', name: '05 knee twist', exportName: 'knee twist', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '6', name: '06a flat-b twist', exportName: 'flat-back twist', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '7', name: '06b x5 open book', exportName: 'x5 open book', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '8', name: '06c hip int/ext', exportName: 'hip int/ext', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '9', name: '07 x20 crunch', exportName: 'x20 crunch', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '10', name: '08 x20 oblique', exportName: 'x20 oblique crunch', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '11', name: '09 x3 McGill curl up', exportName: 'x3 McGill curl up', exportGroup: 'None', color: BASE_COLORS[1], count: 0 },
            { id: '12', name: '09a x30s side plank', exportName: '30s side plank', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '13', name: '09b x10 s plank march', exportName: 'x10 side plank march', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '14', name: '09c x5 push-ups', exportName: 'x5 push-ups', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '15', name: '09d x3 bird dog', exportName: 'x3 bird dog', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '16', name: '09e x5 DNS star', exportName: 'x5 DNS star', exportGroup: 'None', color: BASE_COLORS[2], count: 0 },
            { id: '17', name: '10 hip flex', exportName: 'hip flexor', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '18', name: '10 quad', exportName: 'quad', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '19', name: '11 chest', exportName: 'chest', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '20', name: '12 lat', exportName: 'lat', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '21', name: '13 shoulder ROM', exportName: 'shoulder ROM', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '22', name: '14 ham', exportName: 'ham', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '23', name: '15 inner thigh', exportName: 'inner thigh', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '24', name: '16 hip rotator', exportName: 'hip rotator', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '25', name: '17 t-spine twist', exportName: 't-spine twist', exportGroup: 'Stretch', color: BASE_COLORS[3], count: 0 },
            { id: '26', name: '20 band FULL', exportName: 'full round', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '27', name: '21 W-hold', exportName: 'W-hold', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '28', name: '22 pull apart', exportName: 'pull apart', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '29', name: '23 alphabet', exportName: 'RC alphabet', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '30', name: '24 external', exportName: 'RC external', exportGroup: 'Band', color: BASE_COLORS[4], count: 0 },
            { id: '31', name: '30 mas shin', exportName: 'shin', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '32', name: '31 mas gun', exportName: 'gun', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '33', name: '32 mas finger', exportName: 'finger', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '34', name: '33 mas ball', exportName: 'ball', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '35', name: '34 quad roll', exportName: 'quad roll', exportGroup: 'Massage', color: BASE_COLORS[5], count: 0 },
            { id: '36', name: '40 x20 air squat', exportName: 'x20 air squat', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '37', name: '41 squat stretch', exportName: 'deep squat stretch', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '38', name: '50 skater twist', exportName: 'skater twist', exportGroup: 'None', color: BASE_COLORS[6], count: 0 },
            { id: '39', name: '51 x10 calf', exportName: 'x10 calf raise and stretch', exportGroup: 'None', color: BASE_COLORS[6], count: 0 }
        ];

        function darkenColor(hex, percent) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);

            r = Math.floor(r * (1 - percent / 100));
            g = Math.floor(g * (1 - percent / 100));
            b = Math.floor(b * (1 - percent / 100));

            return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
        }

        function App() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_data');
                return saved ? JSON.parse(saved) : INITIAL_DATA;
            });

            const [categories, setCategories] = useState(() => {
                const saved = localStorage.getItem('thingCountApp_v2_cats');
                return saved ? JSON.parse(saved) : INITIAL_CATEGORIES;
            });
            
            const [editingItem, setEditingItem] = useState(null);
            const [showExport, setShowExport] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [itemToDelete, setItemToDelete] = useState(null);
            const [exportText, setExportText] = useState("");
            const [copied, setCopied] = useState(false);
            const [newCatName, setNewCatName] = useState("");

            useEffect(() => { localStorage.setItem('thingCountApp_v2_data', JSON.stringify(items)); }, [items]);
            useEffect(() => { localStorage.setItem('thingCountApp_v2_cats', JSON.stringify(categories)); }, [categories]);

            const itemsWithGradient = useMemo(() => {
                const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));
                const colorCounts = {};
                
                return sorted.map(item => {
                const base = item.color || BASE_COLORS[7];
                const count = colorCounts[base] || 0;
                colorCounts[base] = count + 1;
                const finalColor = darkenColor(base, count * 3);
                return { ...item, displayColor: finalColor };
                });
            }, [items]);

            const updateCount = (id, delta) => setItems(items.map(item => item.id === id ? { ...item, count: Math.max(0, item.count + delta) } : item));

            const handleResetAll = () => {
                setItems(items.map(item => ({ ...item, count: 0 })));
                setShowResetConfirm(false);
            };

            const generateExportText = () => {
                const activeItems = [...items].filter(item => item.count > 0).sort((a, b) => a.name.localeCompare(b.name));
                let finalExport = "MM: ";
                let currentGroup = null;
                let groupBuffer = [];

                const flushBuffer = () => {
                if (groupBuffer.length === 0) return "";
                const innerText = groupBuffer.map(i => `${i.count} *${i.exportName}`).join('; ');
                const groupName = currentGroup === 'None' ? '' : currentGroup;
                return groupName ? `${groupName} [${innerText}]; ` : `${innerText}; `;
                };

                activeItems.forEach(item => {
                const g = item.exportGroup || 'None';
                if (g !== currentGroup) { finalExport += flushBuffer(); currentGroup = g; groupBuffer = []; }
                groupBuffer.push(item);
                });

                finalExport += flushBuffer();
                setExportText(finalExport.trim());
                setShowExport(true);
                setCopied(false);
            };

            const handleCopy = () => {
                const textArea = document.createElement("textarea");
                textArea.value = exportText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const addCategory = () => {
                if (newCatName && !categories.includes(newCatName)) {
                setCategories([...categories, newCatName]);
                setNewCatName("");
                }
            };

            const deleteCategory = (cat) => {
                if (cat === 'None') return;
                setCategories(categories.filter(c => c !== cat));
                setItems(items.map(i => i.exportGroup === cat ? { ...i, exportGroup: 'None' } : i));
            };

            return (
                <div className="min-h-screen font-sans pb-24 select-none overflow-x-hidden">
                <header className="bg-white px-4 py-3 shadow-sm sticky top-0 z-30 flex items-center justify-between text-[#2e1b6b]">
                    <div className="flex items-center gap-3">
                    <div className="w-8 h-8 rounded-lg bg-[#2e1b6b] flex items-center justify-center text-white font-black text-xs">TC</div>
                    <h1 className="text-xl font-semibold tracking-tight">Thing Count</h1>
                    </div>
                    <div className="flex items-center gap-1">
                    <button onClick={generateExportText} className="p-2.5 rounded-full active:bg-purple-100 transition-colors"><Download className="w-6 h-6" /></button>
                    <button onClick={() => setShowResetConfirm(true)} className="p-2.5 rounded-full active:bg-purple-100 transition-colors"><RotateCcw className="w-6 h-6" /></button>
                    </div>
                </header>

                <main className="p-3 max-w-2xl mx-auto grid grid-cols-2 gap-3">
                    {itemsWithGradient.map(item => (
                    <div key={item.id} className="rounded-xl shadow-sm flex flex-col transition-transform active:scale-[0.97]" style={{ backgroundColor: item.displayColor }}>
                        <div className="pt-3 px-2 pb-1 text-center text-gray-800 text-sm font-medium cursor-pointer" onClick={() => setEditingItem({...item})}>
                        {item.name}
                        </div>
                        <div className="flex items-center justify-between px-2 pb-3">
                        <button onClick={() => updateCount(item.id, -1)} className="w-10 h-10 flex items-center justify-center text-gray-900 active:bg-black/10 rounded-full"><Minus className="w-6 h-6" /></button>
                        <div className="text-4xl font-bold text-gray-900 w-16 text-center tabular-nums cursor-pointer" onClick={() => setEditingItem({...item})}>{item.count}</div>
                        <button onClick={() => updateCount(item.id, 1)} className="w-10 h-10 flex items-center justify-center text-gray-900 active:bg-black/10 rounded-full"><Plus className="w-6 h-6" /></button>
                        </div>
                    </div>
                    ))}
                </main>

                <button onClick={() => setEditingItem({ id: Date.now().toString(), name: '', exportName: '', exportGroup: 'None', color: BASE_COLORS[0], count: 0 })}
                    className="fixed bottom-6 right-6 w-16 h-16 bg-[#2e1b6b] text-white rounded-full shadow-xl flex items-center justify-center active:scale-90 transition-all z-40">
                    <Plus className="w-9 h-9" />
                </button>

                {editingItem && (
                    <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 animate-in fade-in duration-200">
                    <div className="bg-white rounded-t-3xl sm:rounded-2xl w-full max-w-md shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                        <h2 className="text-lg font-bold text-gray-800 uppercase tracking-tight">Counter Settings</h2>
                        <button onClick={() => setEditingItem(null)} className="p-2 text-gray-400 hover:text-gray-800"><X className="w-6 h-6"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                        <div className="space-y-4">
                            <div>
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Display Name</label>
                            <input type="text" value={editingItem.name} onChange={e => setEditingItem({...editingItem, name: e.target.value})}
                                className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 font-medium outline-none" placeholder="Display Name (e.g. 01 cat/cow)"/>
                            </div>
                            
                            <div>
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Export Name (without numbers)</label>
                            <input type="text" value={editingItem.exportName} onChange={e => setEditingItem({...editingItem, exportName: e.target.value})}
                                className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 font-medium outline-none" placeholder="Export Name (e.g. cat/cow)"/>
                            </div>

                            <div>
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Category</label>
                            <select value={editingItem.exportGroup} onChange={e => setEditingItem({...editingItem, exportGroup: e.target.value})}
                                className="w-full px-4 py-3 bg-gray-50 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-500 font-medium outline-none appearance-none">
                                {categories.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                            </div>

                            <div>
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Base Color</label>
                            <div className="flex flex-wrap gap-2.5">
                                {BASE_COLORS.map(color => (
                                <button key={color} onClick={() => setEditingItem({...editingItem, color})}
                                    className={`w-10 h-10 rounded-lg border-4 transition-all ${editingItem.color === color ? 'border-[#2e1b6b] scale-110' : 'border-transparent'}`}
                                    style={{ backgroundColor: color }} />
                                ))}
                            </div>
                            </div>

                            <div className="pt-4 border-t">
                            <label className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 block">Manage Categories</label>
                            <div className="flex gap-2 mb-3">
                                <input type="text" value={newCatName} onChange={e => setNewCatName(e.target.value)}
                                className="flex-1 px-3 py-2 bg-gray-50 rounded-lg text-sm border border-gray-200 outline-none" placeholder="New category..."/>
                                <button onClick={addCategory} className="px-3 py-2 bg-purple-100 text-purple-700 rounded-lg text-sm font-bold active:bg-purple-200">Add</button>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                {categories.filter(c => c !== 'None').map(c => (
                                <span key={c} className="flex items-center gap-1 px-2 py-1 bg-gray-100 rounded-md text-xs font-medium border border-gray-200">
                                    {c} <X className="w-3 h-3 cursor-pointer text-red-400 hover:text-red-600" onClick={() => deleteCategory(c)}/>
                                </span>
                                ))}
                            </div>
                            </div>
                        </div>
                        </div>

                        <div className="p-4 bg-gray-50 flex gap-3">
                        {items.some(i => i.id === editingItem.id) && (
                            <button onClick={() => setItemToDelete(editingItem)}
                            className="px-4 py-3 text-red-500 font-bold active:bg-red-50 rounded-xl transition-colors border border-transparent">Delete</button>
                        )}
                        <div className="flex-1 flex gap-2">
                            <button onClick={() => setEditingItem(null)} className="flex-1 px-4 py-3 text-gray-500 font-bold active:bg-gray-200 rounded-xl transition-colors border border-gray-200 bg-white">Cancel</button>
                            <button onClick={() => { 
                            if(!editingItem.name) return;
                            const finalItem = {...editingItem, exportName: editingItem.exportName || editingItem.name.replace(/^\d+[a-z]?\s*/, '')};
                            setItems(items.some(i => i.id === finalItem.id) ? items.map(i => i.id === finalItem.id ? finalItem : i) : [...items, finalItem]);
                            setEditingItem(null);
                            }} className="flex-1 px-4 py-3 bg-[#2e1b6b] text-white font-bold rounded-xl active:bg-black transition-colors">Save</button>
                        </div>
                        </div>
                    </div>
                    </div>
                )}

                {itemToDelete && (
                    <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-white rounded-2xl w-full max-w-xs shadow-2xl p-6 text-center">
                        <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Trash2 className="w-8 h-8" />
                        </div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">Delete Counter?</h3>
                        <p className="text-gray-500 mb-6">Are you sure you want to delete "{itemToDelete.name}"?</p>
                        <div className="flex flex-col gap-2">
                        <button onClick={() => {
                            setItems(items.filter(i => i.id !== itemToDelete.id));
                            setItemToDelete(null);
                            setEditingItem(null);
                        }} className="w-full py-3 bg-red-600 text-white font-bold rounded-xl active:scale-95 transition-all">YES, DELETE IT</button>
                        <button onClick={() => setItemToDelete(null)} className="w-full py-3 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95 transition-all">CANCEL</button>
                        </div>
                    </div>
                    </div>
                )}

                {showResetConfirm && (
                    <div className="fixed inset-0 bg-black/70 z-[60] flex items-center justify-center p-6 animate-in fade-in zoom-in-95 duration-200">
                    <div className="bg-white rounded-2xl w-full max-w-xs shadow-2xl p-6 text-center">
                        <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                        <RotateCcw className="w-8 h-8" />
                        </div>
                        <h3 className="text-xl font-bold text-gray-900 mb-2">Reset All?</h3>
                        <p className="text-gray-500 mb-6">This will set all your counters back to zero.</p>
                        <div className="flex flex-col gap-2">
                        <button onClick={handleResetAll} className="w-full py-3 bg-red-600 text-white font-bold rounded-xl active:scale-95 transition-all">YES, RESET ALL</button>
                        <button onClick={() => setShowResetConfirm(false)} className="w-full py-3 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95 transition-all">CANCEL</button>
                        </div>
                    </div>
                    </div>
                )}

                {showExport && (
                    <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl flex flex-col max-h-[80vh]">
                        <div className="p-4 border-b flex justify-between items-center bg-[#2e1b6b] text-white">
                        <h2 className="text-lg font-bold tracking-tight">EXPORT LOG</h2>
                        <button onClick={() => setShowExport(false)} className="p-1"><X className="w-6 h-6"/></button>
                        </div>
                        <div className="p-6 overflow-y-auto">
                        <div className="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300 text-gray-800 font-mono text-sm break-words whitespace-pre-wrap leading-relaxed">
                            {exportText || "No active counters!"}
                        </div>
                        </div>
                        <div className="p-4 bg-gray-50 border-t flex gap-3">
                        <button onClick={handleCopy} disabled={!exportText}
                            className={`flex-1 flex items-center justify-center gap-2 py-4 font-bold rounded-xl transition-all shadow-md active:scale-95 ${copied ? 'bg-green-600 text-white' : 'bg-[#2e1b6b] text-white'}`}>
                            {copied ? <><Check className="w-5 h-5" /> Copied!</> : <><Copy className="w-5 h-5" /> Copy to Clipboard</>}
                        </button>
                        </div>
                    </div>
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
